<!DOCTYPE html>
<html>
<head>
  <title>Test Login</title>
</head>
<body>
  <h2>Test Login API</h2>
  <div id="result"></div>
  
  <script>
    async function testLogin() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = 'Testing...';
      
      try {
        // Get captcha
        const captchaRes = await fetch('/api/auth/captcha');
        const captcha = await captchaRes.json();
        console.log('Captcha:', captcha);
        
        // Calculate answer (5 + 1 = 6)
        const answer = eval(captcha.question.replace('=', ''));
        
        // Try login
        const loginRes = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: 'admin',
            password: 'admin123',
            captchaId: captcha.id,
            captchaAnswer: answer
          })
        });
        
        const data = await loginRes.json();
        console.log('Login response:', data);
        
        if (loginRes.ok) {
          resultDiv.innerHTML = '<p style="color: green;">✅ Login SUCCESS!</p>' +
            '<p>Token: ' + data.token.substring(0, 30) + '...</p>' +
            '<p>User: ' + data.name + ' (' + data.role + ')</p>';
        } else {
          resultDiv.innerHTML = '<p style="color: red;">❌ Login FAILED: ' + (data.message || 'Unknown error') + '</p>';
        }
      } catch (err) {
        resultDiv.innerHTML = '<p style="color: red;">❌ Error: ' + err.message + '</p>';
        console.error('Error:', err);
      }
    }
    
    // Auto test on load
    testLogin();
  </script>
</body>
</html>
