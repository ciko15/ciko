# SNMPD Configuration for TOC Airport Monitoring
# Simple SNMP agent configuration

# Listen on localhost only
agentaddress 127.0.0.1:16100

# SNMPv2c community
rocommunity moxa_ioThinx_4150
rocommunity radar_primary
rocommunity public

# System information
syslocation TOC Airport Monitoring Lab
syscontact admin@toc.local
sysName snmp-agent

# Extend with custom OIDs
# MOXA ioThinx 4150 OIDs (enterprise 50000)
# radar_system OIDs (enterprise 99991)

# Don't log rotations
dontLogTCPWrappersConnectAttempts 1

