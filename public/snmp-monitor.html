<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNMP Data Monitor - TOC</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 {
      color: var(--accent-primary);
      margin-bottom: 20px;
    }
    
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 15px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .card-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .status-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    
    .status-running {
      background: rgba(16, 185, 129, 0.15);
      color: #10b981;
    }
    
    .status-stopped {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }
    
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s;
    }
    
    .btn-primary {
      background: var(--accent-primary);
      color: white;
    }
    
    .btn-success {
      background: #10b981;
      color: white;
    }
    
    .btn-danger {
      background: #ef4444;
      color: white;
    }
    
    .btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }
    
    .data-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }
    
    .data-item {
      background: var(--bg-secondary);
      padding: 15px;
      border-radius: 8px;
      border: 1px solid var(--border-color);
    }
    
    .data-label {
      color: var(--text-muted);
      font-size: 0.8rem;
      margin-bottom: 5px;
      text-transform: uppercase;
    }
    
    .data-value {
      color: var(--text-primary);
      font-size: 1.1rem;
      font-weight: 600;
    }
    
    .data-value input {
      width: 100%;
      padding: 8px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      font-size: 1rem;
    }
    
    .data-value input:focus {
      outline: none;
      border-color: var(--accent-primary);
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: var(--text-muted);
    }
    
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
    }
    
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    
    .log-container {
      background: var(--bg-secondary);
      padding: 15px;
      border-radius: 8px;
      max-height: 300px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 0.85rem;
    }
    
    .log-entry {
      padding: 5px 0;
      border-bottom: 1px solid var(--border-color);
    }
    
    .log-entry.info {
      color: #3b82f6;
    }
    
    .log-entry.success {
      color: #10b981;
    }
    
    .log-entry.error {
      color: #ef4444;
    }
    
    .template-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .template-btn {
      padding: 10px 20px;
      background: var(--bg-secondary);
      border: 2px solid var(--border-color);
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-primary);
      transition: all 0.3s;
    }
    
    .template-btn.active {
      border-color: var(--accent-primary);
      background: rgba(37, 99, 235, 0.1);
    }
    
    .template-btn:hover {
      border-color: var(--accent-primary);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-network-wired"></i> SNMP Data Monitor</h1>
    
    <!-- Simulator Control -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">SNMP Simulator Control</span>
        <span id="simulatorStatus" class="status-badge status-stopped">
          <i class="fas fa-circle"></i> Stopped
        </span>
      </div>
      
      <div class="actions">
        <button class="btn btn-success" onclick="startSimulator()">
          <i class="fas fa-play"></i> Start Simulator
        </button>
        <button class="btn btn-danger" onclick="stopSimulator()">
          <i class="fas fa-stop"></i> Stop Simulator
        </button>
        <button class="btn btn-primary" onclick="refreshData()">
          <i class="fas fa-sync"></i> Refresh Data
        </button>
      </div>
    </div>
    
    <!-- Template Selection -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Pilih Template</span>
      </div>
      <div class="template-selector">
        <button class="template-btn active" onclick="selectTemplate('moxa')">
          <i class="fas fa-microchip"></i> MOXA ioThinx
        </button>
        <button class="template-btn" onclick="selectTemplate('radar')">
          <i class="fas fa-satellite-dish"></i> Radar System
        </button>
        <button class="template-btn" onclick="selectTemplate('generic')">
          <i class="fas fa-cog"></i> Generic
        </button>
      </div>
    </div>
    
    <!-- Data Editor -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Edit Data SNMP</span>
        <button class="btn btn-primary" onclick="saveData()">
          <i class="fas fa-save"></i> Simpan Perubahan
        </button>
      </div>
      
      <div id="dataGrid" class="data-grid">
        <!-- Data akan di-load di sini -->
      </div>
    </div>
    
    <!-- Activity Log -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Activity Log</span>
        <button class="btn" onclick="clearLog()" style="background: var(--bg-secondary);">
          <i class="fas fa-trash"></i> Clear
        </button>
      </div>
      <div id="logContainer" class="log-container">
        <div class="log-entry info">SNMP Monitor siap digunakan...</div>
      </div>
    </div>
  </div>

  <script>
    // SNMP Data Templates
    const snmpData = {
      moxa: {
        '1.1.0': { label: 'Device Name', value: 'ioThinx-PowerUnit-01', type: 'string' },
        '1.2.0': { label: 'Firmware Version', value: 'FW-1.0.3', type: 'string' },
        '1.3.0': { label: 'Uptime (seconds)', value: '86400', type: 'integer' },
        '2.1.0': { label: 'Digital Input 1', value: '1', type: 'integer' },
        '2.2.0': { label: 'Digital Input 2', value: '0', type: 'integer' },
        '2.3.0': { label: 'Digital Input 3', value: '1', type: 'integer' },
        '3.1.0': { label: 'Analog Input 1', value: '1', type: 'integer' },
        '3.2.0': { label: 'Analog Input 1 Value', value: '225', type: 'integer' },
        '4.1.0': { label: 'Relay Output 1', value: '1', type: 'integer' },
        '5.1.1.0': { label: 'Power Status', value: '1', type: 'integer' },
        '6.1.0': { label: 'Temperature (°C)', value: '25', type: 'integer' },
        '6.2.0': { label: 'Humidity (%)', value: '60', type: 'integer' },
        '6.3.0': { label: 'Alarm Status', value: '0', type: 'integer' }
      },
      radar: {
        '1.1.0': { label: 'System Status', value: '1', type: 'integer' },
        '1.2.0': { label: 'Radar Mode', value: '4', type: 'integer' },
        '1.3.0': { label: 'Operational Status', value: 'Online', type: 'string' },
        '2.1.0': { label: 'Azimuth (degrees)', value: '45', type: 'integer' },
        '2.2.0': { label: 'Range (NM)', value: '100', type: 'integer' },
        '2.3.0': { label: 'Scan Rate (RPM)', value: '12', type: 'integer' },
        '3.1.0': { label: 'Transmitter Power (dBm)', value: '-65', type: 'integer' },
        '4.1.0': { label: 'Pedestal Status', value: '1', type: 'integer' },
        '5.1.0': { label: 'Cooling Status', value: '1', type: 'integer' },
        '6.1.0': { label: 'Fan Status', value: '1', type: 'integer' }
      },
      generic: {
        '1.1.0': { label: 'System Description', value: 'Generic-Device-01', type: 'string' },
        '1.2.0': { label: 'System Uptime', value: '3600', type: 'integer' },
        '1.3.0': { label: 'System Contact', value: 'admin@example.com', type: 'string' },
        '1.4.0': { label: 'System Name', value: 'TOC-Monitor', type: 'string' },
        '1.5.0': { label: 'System Location', value: 'Airport TOC', type: 'string' }
      }
    };
    
    let currentTemplate = 'moxa';
    let simulatorRunning = false;
    
    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadData();
    });
    
    function selectTemplate(template) {
      currentTemplate = template;
      
      // Update button states
      document.querySelectorAll('.template-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.closest('.template-btn').classList.add('active');
      
      loadData();
      addLog(`Template changed to: ${template}`, 'info');
    }
    
    function loadData() {
      const grid = document.getElementById('dataGrid');
      const data = snmpData[currentTemplate];
      
      grid.innerHTML = '';
      
      for (const [oid, info] of Object.entries(data)) {
        const item = document.createElement('div');
        item.className = 'data-item';
        item.innerHTML = `
          <div class="data-label">${info.label}</div>
          <div class="data-value">
            <input type="${info.type === 'integer' ? 'number' : 'text'}" 
                   data-oid="${oid}" 
                   value="${info.value}"
                   onchange="updateValue('${oid}', this.value)">
            <small style="color: var(--text-muted);">OID: 1.3.6.1.4.1.${currentTemplate === 'moxa' ? '50000' : (currentTemplate === 'radar' ? '99991' : '2.1')}.${oid}</small>
          </div>
        `;
        grid.appendChild(item);
      }
    }
    
    function updateValue(oid, value) {
      snmpData[currentTemplate][oid].value = value;
      addLog(`Updated OID ${oid} to: ${value}`, 'info');
    }
    
    function saveData() {
      addLog('Data saved successfully!', 'success');
      addLog('Data will be sent to application on next request.', 'info');
      
      // Show current data as JSON
      console.log('Current SNMP Data:', JSON.stringify(snmpData[currentTemplate], null, 2));
    }
    
    function startSimulator() {
      simulatorRunning = true;
      document.getElementById('simulatorStatus').innerHTML = '<i class="fas fa-circle"></i> Running';
      document.getElementById('simulatorStatus').className = 'status-badge status-running';
      addLog('SNMP Simulator started on 127.0.0.1:16100', 'success');
    }
    
    function stopSimulator() {
      simulatorRunning = false;
      document.getElementById('simulatorStatus').innerHTML = '<i class="fas fa-circle"></i> Stopped';
      document.getElementById('simulatorStatus').className = 'status-badge status-stopped';
      addLog('SNMP Simulator stopped', 'info');
    }
    
    function refreshData() {
      loadData();
      addLog('Data refreshed', 'info');
    }
    
    function clearLog() {
      document.getElementById('logContainer').innerHTML = '';
    }
    
    function addLog(message, type = 'info') {
      const container = document.getElementById('logContainer');
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      container.insertBefore(entry, container.firstChild);
    }
  </script>
</body>
</html>
